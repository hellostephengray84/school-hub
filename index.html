<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>School Hub</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1E3A8A" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F0F4FF; font-family: -apple-system, 'Inter', sans-serif; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; scroll-behavior: smooth; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    // ── ASB crest ───────────────────────────────────────────────────────────
    function ASBLogo({ size = 22 }) {
      const h = size * (60 / 48);
      return (
        <svg width={size} height={h} viewBox="0 0 48 60" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path fillRule="evenodd" clipRule="evenodd" d="M0 27.5332V29.6021H8.13289V27.5332H5.90033V26.5782L9.56811 20.6897H21.0498L22.4851 26.5782V27.5332H19.1362V29.6021H30.9369V27.5332H29.3422L22.4851 0H19.1362L2.5515 27.5332H0ZM17.701 6.68435L20.5714 18.4615H10.6844L17.701 6.68435Z" fill="white"/>
          <path fillRule="evenodd" clipRule="evenodd" d="M15.6279 30.557V32.7851C16.5316 32.679 18.2751 32.817 18.0199 34.2175C17.7648 35.618 15.1495 49.3369 13.8738 56.0212C13.8738 56.7639 13.1402 58.2175 10.206 58.0902V60H26.3123C28.9169 59.947 34.2538 58.2493 34.7641 51.8833C34.9236 49.7613 33.903 45.3581 28.5449 44.7215C30.9369 44.0318 35.8166 41.443 36.1993 36.6048C36.5821 31.7666 31.2558 30.557 28.5449 30.557H15.6279ZM24.0797 32.626L21.6877 43.9257C24.1329 44.0318 29.2465 43.0345 30.1395 38.1963C30.6711 36.1804 30.2033 32.244 24.0797 32.626ZM21.1678 45.9947L19.2542 55.5438C19.0416 56.2865 18.9672 57.7719 20.3705 57.7719C20.3876 57.7719 20.405 57.7719 20.4226 57.7719C20.452 57.772 20.4821 57.772 20.5129 57.7721C22.3551 57.7763 26.6271 57.786 28.025 52.3607C29.4602 46.7905 23.8788 45.6764 21.1678 45.9947Z" fill="white"/>
          <path d="M28.5449 35.1724H25.6744L24.8771 41.061L31.0963 42.0159C37.6346 42.9708 45.608 39.4695 45.4485 33.1034C45.289 26.7374 36.6777 22.7586 35.2425 20.0531C33.8073 17.3475 35.2425 14.4828 39.7076 13.8462C43.2797 13.3369 44.2791 15.2255 44.3322 16.2334L43.8538 18.7798H47.0432L48 13.3687C45.289 12.0955 42.2591 11.9363 38.7508 11.7772C35.2425 11.618 29.6611 13.8462 29.0233 19.2573C28.513 23.5862 32 27.1088 33.8073 28.3289C35.7209 29.443 39.3887 32.3714 38.7508 35.1724C37.9535 38.6737 36.5183 40.2653 31.8937 40.1061C28.194 39.9788 28.1196 36.7639 28.5449 35.1724Z" fill="white"/>
        </svg>
      );
    }

    // ── Seed events ─────────────────────────────────────────────────────────
    const SEED_EVENTS = [
      { id:"f1",  date:"2026-06-22", title:"Own Clothes Day", type:"dress-up", yearGroups:["all"], detail:"Wear own clothes. Bring donations of sweets and a bottle of wine/alcohol for the Summer Fayre wine stall. No chocolate (it will melt). Drop donations at school office — not with pupils. Also save empty wine bottles with lids and bring in any day next week.", source:"flyer", urgent:true },
      { id:"f2",  date:"2026-06-26", title:"Summer Fayre — 3:30pm", type:"event", yearGroups:["all"], detail:"The Friends' Summer Fayre in front of the Vicarage, up on the heath. 3:30pm start. Speak to the Friends about volunteering to help run a stall.", source:"flyer", urgent:false },
      { id:"f3",  date:"2026-07-13", title:"Musical Theatre End of Term Show — 4:30pm", type:"event", yearGroups:["all"], detail:"Musical Theatre end of term show in the school hall. 4:30pm.", source:"flyer", urgent:false },
      { id:"f4",  date:"2026-07-15", title:"Year 6 Play at Blackheath High", type:"event", yearGroups:["year6"], detail:"Year 6 Play at Blackheath High School. Time TBC.", source:"flyer", urgent:false },
      { id:"f5",  date:"2026-07-16", title:"End of Term Mass — 2:30pm", type:"assembly", yearGroups:["all"], detail:"End of term Mass at 2:30pm. All are welcome. Pick up from church.", source:"flyer", urgent:false },
      { id:"f6",  date:"2026-07-17", title:"Year 6 Leavers' Service — 9:30am", type:"assembly", yearGroups:["year6"], detail:"Year 6 Leavers' service in church at 9:30am. All Year 6 families and friends welcome.", source:"flyer", urgent:false },
      { id:"f7",  date:"2026-07-17", title:"Last Day of Term — 1:30pm Finish", type:"term", yearGroups:["all"], detail:"Last day of term. School finishes at 1:30pm. No after-school clubs. Breakfast Club runs as usual. Break up for Summer Holidays.", source:"flyer", urgent:false },
      { id:"f8",  date:"2026-09-02", title:"INSET Day — No School", type:"inset", yearGroups:["all"], detail:"Staff training day. Children do not come in.", source:"flyer", urgent:false },
      { id:"f9",  date:"2026-09-03", title:"INSET Day — No School", type:"inset", yearGroups:["all"], detail:"Staff training day. Children do not come in. School restarts Friday 4th September.", source:"flyer", urgent:false },
      { id:"f10", date:"2026-10-26", title:"Half Term Starts", type:"term", yearGroups:["all"], detail:"Autumn half term begins.", source:"flyer", urgent:false },
      { id:"f11", date:"2026-12-18", title:"INSET Day", type:"inset", yearGroups:["all"], detail:"Staff training day. Children do not come in.", source:"flyer", urgent:false },
      { id:"f12", date:"2027-01-04", title:"INSET Day", type:"inset", yearGroups:["all"], detail:"Staff training day. Children do not come in. Spring term begins 5th January.", source:"flyer", urgent:false },
      { id:"f13", date:"2027-02-15", title:"Half Term Starts", type:"term", yearGroups:["all"], detail:"Spring half term begins.", source:"flyer", urgent:false },
      { id:"f14", date:"2027-03-26", title:"INSET Day", type:"inset", yearGroups:["all"], detail:"Staff training day. Children do not come in.", source:"flyer", urgent:false },
      { id:"f15", date:"2027-04-14", title:"INSET Day", type:"inset", yearGroups:["all"], detail:"Staff training day. Children do not come in. Summer term begins 15th April.", source:"flyer", urgent:false },
      { id:"f16", date:"2027-05-03", title:"Bank Holiday — No School", type:"inset", yearGroups:["all"], detail:"Public Bank Holiday.", source:"flyer", urgent:false },
      { id:"f17", date:"2027-05-26", title:"Half Term Starts", type:"term", yearGroups:["all"], detail:"Summer half term begins.", source:"flyer", urgent:false },
      { id:"f18", date:"2027-07-09", title:"INSET Day", type:"inset", yearGroups:["all"], detail:"Staff training day. Children do not come in.", source:"flyer", urgent:false },
      { id:"f19", date:"2026-06-17", title:"Sainsbury's Uniform Sale (predicted 20% off)", type:"action", yearGroups:["all"], detail:"Sainsbury's predicted 20% off school uniform from Wednesday 17th June 2026. Dates may change.", source:"flyer", urgent:false },
      { id:"f20", date:"2026-06-22", title:"ASDA Uniform Sale (predicted 20% off)", type:"action", yearGroups:["all"], detail:"ASDA predicted 20% off school uniform from Monday 22nd June 2026. Dates may change.", source:"flyer", urgent:false },
      { id:"f21", date:"2026-06-28", title:"Aldi Uniform Bundle Sale (predicted £5 bundle)", type:"action", yearGroups:["all"], detail:"Aldi predicted £5 uniform bundle from Sunday 28th June 2026. Dates may change.", source:"flyer", urgent:false },
      { id:"f22", date:"2026-07-07", title:"M&S Uniform Sale (predicted 20% off)", type:"action", yearGroups:["all"], detail:"M&S predicted 20% off school uniform from Tuesday 7th July 2026. Dates may change.", source:"flyer", urgent:false },
      { id:"f23", date:"2026-07-09", title:"Lidl Uniform Bundle Sale (predicted £5 bundle)", type:"action", yearGroups:["all"], detail:"Lidl predicted £5 uniform bundle from Thursday 9th July 2026. Dates may change.", source:"flyer", urgent:false },
      { id:"f24", date:"2026-07-20", title:"Tesco Uniform Sale (predicted 25% off)", type:"action", yearGroups:["all"], detail:"Tesco predicted 25% off school uniform from Monday 20th July 2026. Dates may change.", source:"flyer", urgent:false },
      { id:"w1",  date:"2026-06-19", title:"Praise Assembly — collect from church ~3:30pm", type:"assembly", yearGroups:["year1"], detail:"Confirmed by class rep today. Starts approx 3pm. Collect from church ~3:30pm. Children in after-school clubs will be escorted.", source:"whatsapp", urgent:true },
      { id:"w2",  date:"2026-07-12", title:"Children's Mass — All Saints' Church", type:"assembly", yearGroups:["all"], detail:"Next Children's Mass on Sunday 12th July. Theme: planting seeds. 10:30am Mass. Speak to Father Nicholas for more info.", source:"flyer", urgent:false },
      { id:"r1",  date:"2026-06-30", title:"Young Queens FC — Register Interest (deadline 30 Jun)", type:"action", yearGroups:["all"], detail:"Girls football club for ages under 8–16. All abilities. Register interest by 30th June for 2026/27 season. Scan QR in flyer.", source:"flyer", urgent:false },
    ];

    const TYPE_META = {
      assembly:   { label:"Assembly",          icon:"⛪", color:"#7C3AED" },
      trip:       { label:"School Trip",       icon:"🚌", color:"#0284C7" },
      event:      { label:"School Event",      icon:"🏫", color:"#0EA5E9" },
      inset:      { label:"INSET / No School", icon:"🚫", color:"#DC2626" },
      "dress-up": { label:"Non-Uniform Day",   icon:"👕", color:"#D97706" },
      term:       { label:"Term Date",         icon:"📅", color:"#16A34A" },
      action:     { label:"Action / Reminder", icon:"⚠️", color:"#EA580C" },
      social:     { label:"Social",            icon:"🎉", color:"#DB2777" },
      homework:   { label:"Homework",          icon:"📚", color:"#6366F1" },
      custom:     { label:"Custom",            icon:"✏️", color:"#64748B" },
    };

    const YEAR_GROUP_LABELS = {
      all:"Whole School", reception:"Reception",
      year1:"Year 1", year2:"Year 2", year3:"Year 3",
      year4:"Year 4", year5:"Year 5", year6:"Year 6",
      ks1:"KS1", ks2:"KS2",
    };

    function formatDate(d) {
      if (!d) return "";
      return new Date(d + "T12:00:00").toLocaleDateString("en-GB", {
        weekday:"short", day:"numeric", month:"long", year:"numeric"
      });
    }

    function daysUntil(dateStr) {
      const today = new Date(); today.setHours(0,0,0,0);
      return Math.ceil((new Date(dateStr + "T00:00:00") - today) / 86400000);
    }

    function Badge({ type, small }) {
      const m = TYPE_META[type] || TYPE_META.custom;
      return (
        <span style={{
          display:"inline-flex", alignItems:"center", gap:3,
          background:m.color+"18", color:m.color,
          border:`1px solid ${m.color}33`, borderRadius:20,
          padding:small?"2px 7px":"3px 10px",
          fontSize:small?11:12, fontWeight:600, whiteSpace:"nowrap"
        }}>
          <span style={{fontSize:small?9:11}}>{m.icon}</span>{m.label}
        </span>
      );
    }

    function YearBadge({ group }) {
      return (
        <span style={{
          background:"#1D4ED810", color:"#1D4ED8", border:"1px solid #1D4ED825",
          borderRadius:20, padding:"2px 8px", fontSize:11, fontWeight:600
        }}>{YEAR_GROUP_LABELS[group] || group}</span>
      );
    }

    function DaysChip({ days }) {
      if (days < 0) return <span style={{color:"#94A3B8",fontSize:11}}>Past</span>;
      const label = days === 0 ? "TODAY" : `${days}d`;
      return (
        <span style={{
          background:"#E2E8F0", color:"#64748B", borderRadius:12,
          padding:"2px 8px", fontSize:11, fontWeight:600, whiteSpace:"nowrap"
        }}>{label}</span>
      );
    }

    const inputStyle = {
      width:"100%", border:"1px solid #E2E8F0", borderRadius:8, padding:"10px 12px",
      fontSize:13, boxSizing:"border-box", background:"#F8FAFC", color:"#0F172A"
    };

    function Modal({ children, onClose }) {
      return (
        <div
          onClick={e => { if (e.target === e.currentTarget) onClose(); }}
          style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:100,overflowY:"auto"}}>
          <div style={{
            background:"#fff", borderRadius:"20px 20px 0 0",
            position:"fixed", bottom:0, left:0, right:0,
            maxWidth:480, margin:"0 auto", maxHeight:"92vh", overflowY:"auto"
          }}>
            {children}
          </div>
        </div>
      );
    }

    function ModalTitle({ children, onClose }) {
      return (
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={{fontSize:17,fontWeight:800,color:"#0F172A"}}>{children}</div>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:24,cursor:"pointer",color:"#94A3B8",padding:0,lineHeight:1}}>×</button>
        </div>
      );
    }

    function Label({ children }) {
      return <div style={{fontSize:12,fontWeight:600,color:"#64748B",marginBottom:4,marginTop:12}}>{children}</div>;
    }

    function SourcePill({ source }) {
      const map = { flyer:"📄 Flyer", whatsapp:"💬 WhatsApp", custom:"✏️ Added" };
      return <span style={{fontSize:10,color:"#94A3B8"}}>{map[source]||source}</span>;
    }

    // ── Main app ─────────────────────────────────────────────────────────────
    function App() {
      // Persist events in localStorage; seed on first visit
      const [events, setEvents] = useState(() => {
        try {
          const stored = localStorage.getItem("schoolhub_events");
          return stored ? JSON.parse(stored) : SEED_EVENTS;
        } catch { return SEED_EVENTS; }
      });

      useEffect(() => {
        try { localStorage.setItem("schoolhub_events", JSON.stringify(events)); } catch {}
      }, [events]);

      // API key stored in localStorage so it persists (never in the code/repo)
      const [apiKey, setApiKey] = useState(() => localStorage.getItem("schoolhub_apikey") || "");
      useEffect(() => {
        try { localStorage.setItem("schoolhub_apikey", apiKey); } catch {}
      }, [apiKey]);

      const [filterType, setFilterType] = useState("all");
      const [filterYear, setFilterYear] = useState("year1");
      const [showAdd,    setShowAdd]    = useState(false);
      const [showFlyer,  setShowFlyer]  = useState(false);
      const [selected,   setSelected]   = useState(null);
      const [calSuccess, setCalSuccess] = useState(null);

      const dayStripRef    = useRef(null);
      const scrollThumbRef = useRef(null);
      const rafRef         = useRef(null);
      const dayRefs        = useRef({});
      const [visibleMonth, setVisibleMonth] = useState(null);

      // Flyer parser state
      const [flyerFile,    setFlyerFile]    = useState(null);
      const [flyerLoading, setFlyerLoading] = useState(false);
      const [flyerResult,  setFlyerResult]  = useState(null);

      // Add event state
      const [newEv, setNewEv] = useState({ title:"", date:"", type:"event", yearGroups:["year1"], detail:"" });

      const today    = new Date().toISOString().split("T")[0];
      const todayStr = today;
      const DAY_ABBR = ["SUN","MON","TUE","WED","THU","FRI","SAT"];
      const blue     = "#1D4ED8", blueL = "#EFF6FF", blueMid = "#DBEAFE";

      // Day strip scroll handler
      const weekDays = Array.from({length:21}, (_,i) => {
        const d = new Date(); d.setHours(0,0,0,0);
        d.setDate(d.getDate() + i);
        return d.toISOString().split("T")[0];
      });

      function handleDayStripScroll(e) {
        if (rafRef.current) return;
        const el = e.currentTarget;
        rafRef.current = requestAnimationFrame(() => {
          rafRef.current = null;
          const max = el.scrollWidth - el.clientWidth;
          const pct = max > 0 ? el.scrollLeft / max : 0;
          if (scrollThumbRef.current) scrollThumbRef.current.style.left = `${pct * 70}%`;
          const containerLeft = el.getBoundingClientRect().left;
          let leadingDate = null, leadingLeft = -Infinity;
          for (const [dateStr, node] of Object.entries(dayRefs.current)) {
            if (!node) continue;
            const nodeLeft = node.getBoundingClientRect().left;
            if (nodeLeft <= containerLeft + 1 && nodeLeft > leadingLeft) {
              leadingLeft = nodeLeft; leadingDate = dateStr;
            }
          }
          if (!leadingDate && weekDays.length) leadingDate = weekDays[0];
          if (leadingDate) {
            const d = new Date(leadingDate + "T12:00:00");
            const label = d.toLocaleDateString("en-GB", { month:"long", year:"numeric" });
            setVisibleMonth(prev => prev === label ? prev : label);
          }
        });
      }

      const weekStart  = new Date(weekDays[0] + "T12:00:00");
      const monthLabel = visibleMonth || weekStart.toLocaleDateString("en-GB", { month:"long", year:"numeric" });

      const eventsOnDay = (dateStr) =>
        events.filter(e => e.date === dateStr &&
          (filterYear === "all" || e.yearGroups.includes(filterYear) || e.yearGroups.includes("all")));

      const sorted   = arr => [...arr].sort((a,b) => a.date.localeCompare(b.date));
      const filtered = sorted(events)
        .filter(e => daysUntil(e.date) >= 0)
        .filter(e => filterType === "all" || e.type === filterType)
        .filter(e => filterYear === "all" || e.yearGroups.includes(filterYear) || e.yearGroups.includes("all"));

      function addToCalendar(ev) {
        const fmt   = d => d.toISOString().replace(/[-:.]/g,"").slice(0,15)+"Z";
        const start = new Date(ev.date+"T09:00:00");
        const end   = new Date(ev.date+"T10:00:00");
        const params = new URLSearchParams({
          action:"TEMPLATE",
          text:`${ev.title} – All Saints' Blackheath`,
          dates:`${fmt(start)}/${fmt(end)}`,
          details:ev.detail||"",
          location:"All Saints' C of E Primary School, Blackheath, SE3 0TX",
        });
        window.open(`https://calendar.google.com/calendar/render?${params}`, "_blank");
        setCalSuccess(ev.id);
        setTimeout(() => setCalSuccess(null), 2500);
      }

      function addEvent() {
        if (!newEv.title || !newEv.date) return;
        setEvents(p => [...p, {...newEv, id:"c_"+Date.now(), source:"custom", urgent:daysUntil(newEv.date)<=3}]);
        setNewEv({ title:"", date:"", type:"event", yearGroups:["year1"], detail:"" });
        setShowAdd(false);
      }

      async function parseFlyer() {
        if (!flyerFile) return;
        if (!apiKey.trim()) { setFlyerResult({error:"Please enter your Anthropic API key above."}); return; }
        setFlyerLoading(true); setFlyerResult(null);
        try {
          // Read PDF as base64
          const base64 = await new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result.split(",")[1]);
            reader.onerror = () => reject(new Error("Could not read file"));
            reader.readAsDataURL(flyerFile);
          });
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method:"POST",
            headers:{
              "Content-Type":"application/json",
              "x-api-key": apiKey,
              "anthropic-version": "2023-06-01",
              "anthropic-dangerous-direct-browser-access": "true",
            },
            body: JSON.stringify({
              model:"claude-sonnet-4-6", max_tokens:1500,
              messages:[{ role:"user", content:[
                { type:"document", source:{ type:"base64", media_type:"application/pdf", data:base64 } },
                { type:"text", text:`You are helping a parent at All Saints' C of E Primary School Blackheath extract events from this Friday Flyer PDF.\n\nExtract ALL dates, events, deadlines, term dates, INSET days and reminders. Return ONLY valid JSON with no markdown:\n{"flyerDate":"string","summary":"string","events":[{"title":"string","date":"YYYY-MM-DD or null","type":"assembly|trip|event|inset|dress-up|term|action|social|homework","yearGroups":["all|year1|year2|year3|year4|year5|year6|reception"],"detail":"string"}]}` }
              ]}]
            })
          });
          const data = await res.json();
          if (data.error) throw new Error(data.error.message);
          const text = data.content?.find(b => b.type==="text")?.text || "";
          setFlyerResult(JSON.parse(text.replace(/```json|```/g,"").trim()));
        } catch(e) {
          setFlyerResult({error:"Could not parse: " + (e.message || "Check your API key and try again.")});
        }
        setFlyerLoading(false);
      }

      function importFlyer() {
        if (!flyerResult?.events) return;
        const newFlyerEvents = flyerResult.events.map(e => ({
          ...e, id:"fl_"+Date.now()+Math.random(), source:"flyer",
          urgent: e.date && daysUntil(e.date) <= 3
        }));
        setEvents(p => [...p.filter(e => e.source !== "flyer"), ...newFlyerEvents]);
        setShowFlyer(false); setFlyerResult(null);
      }

      return (
        <div style={{fontFamily:"-apple-system,'Inter',sans-serif",background:"#F0F4FF",minHeight:"100vh",maxWidth:480,margin:"0 auto"}}>

          {/* ── HERO ── */}
          <div style={{background:"linear-gradient(160deg,#1E3A8A 0%,#1D4ED8 65%,#2563EB 100%)",color:"#fff"}}>

            <div style={{padding:"28px 24px 0",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div style={{fontSize:34,fontWeight:900,letterSpacing:-1.2,lineHeight:1}}>School Hub</div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <ASBLogo size={26}/>
              </div>
            </div>

            <div style={{padding:"22px 24px 14px"}}>
              <div style={{fontSize:11,fontWeight:700,opacity:.6,letterSpacing:1,textTransform:"uppercase",marginBottom:3}}>Coming up</div>
              <div style={{fontSize:20,fontWeight:900,letterSpacing:-.5}}>{monthLabel}</div>
            </div>

            {/* Day strip */}
            <div
              ref={dayStripRef}
              onScroll={handleDayStripScroll}
              className="hide-scrollbar"
              style={{
                display:"flex", overflowX:"auto", padding:"8px 16px 10px", gap:4,
                WebkitOverflowScrolling:"touch", touchAction:"pan-x",
                overscrollBehaviorX:"contain", scrollSnapType:"x proximity",
              }}>
              {weekDays.map(dateStr => {
                const d        = new Date(dateStr + "T12:00:00");
                const dayNum   = d.getDate();
                const dayName  = DAY_ABBR[d.getDay()];
                const isToday  = dateStr === todayStr;
                const isWeekend = d.getDay() === 0 || d.getDay() === 6;
                const evs      = eventsOnDay(dateStr);
                const hasEvs   = evs.length > 0;
                return (
                  <div
                    key={dateStr}
                    ref={node => { dayRefs.current[dateStr] = node; }}
                    onClick={() => hasEvs && setSelected(evs[0])}
                    style={{
                      display:"flex", flexDirection:"column", alignItems:"center",
                      padding:"12px 10px 14px", borderRadius:16, minWidth:52, flexShrink:0,
                      background:isToday ? "rgba(255,255,255,0.18)" : "transparent",
                      opacity:isWeekend && !hasEvs ? 0.35 : 1,
                      cursor:hasEvs ? "pointer" : "default",
                      position:"relative", scrollSnapAlign:"start",
                    }}>
                    <div style={{fontSize:9,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",color:"#fff",opacity:isToday?.9:.5,marginBottom:8}}>{dayName}</div>
                    <div style={{fontSize:29,fontWeight:900,lineHeight:1,color:"#fff",opacity:isToday?1:.8}}>{dayNum}</div>
                    <div style={{marginTop:9,minHeight:18,display:"flex",justifyContent:"center"}}>
                      {hasEvs && (
                        <div style={{
                          width:18,height:18,borderRadius:"50%",
                          background:"#fff",color:blue,
                          fontSize:10,fontWeight:800,
                          display:"flex",alignItems:"center",justifyContent:"center",
                          boxShadow:"0 1px 4px rgba(0,0,0,0.25)"
                        }}>{evs.length}</div>
                      )}
                    </div>
                    {isToday && (
                      <div style={{
                        position:"absolute",bottom:4,left:"50%",transform:"translateX(-50%)",
                        width:18,height:2,borderRadius:2,background:"rgba(255,255,255,0.65)"
                      }}/>
                    )}
                  </div>
                );
              })}
            </div>

            {/* Scroll progress */}
            <div style={{padding:"10px 24px 28px"}}>
              <div style={{height:3,borderRadius:2,background:"rgba(255,255,255,0.15)",position:"relative",overflow:"hidden"}}>
                <div ref={scrollThumbRef} style={{
                  position:"absolute",top:0,bottom:0,left:0,
                  width:"30%",borderRadius:2,background:"rgba(255,255,255,0.55)",
                }}/>
              </div>
            </div>
          </div>

          {/* ── ACTION BAR ── */}
          <div style={{background:"#fff",borderBottom:"1px solid #E2E8F0",padding:"10px 16px",display:"flex",gap:8}}>
            <button onClick={()=>setShowFlyer(true)} style={{flex:1,background:blueL,color:blue,border:`1px solid ${blueMid}`,borderRadius:8,padding:"8px 6px",fontSize:12,fontWeight:600,cursor:"pointer"}}>📄 Load Flyer</button>
            <button onClick={()=>setShowAdd(true)}   style={{flex:1,background:blue,color:"#fff",border:"none",borderRadius:8,padding:"8px 6px",fontSize:12,fontWeight:700,cursor:"pointer"}}>+ Add Event</button>
          </div>

          {/* ── FILTERS ── */}
          <div style={{padding:"10px 16px",display:"flex",gap:8}}>
            <select value={filterType} onChange={e=>setFilterType(e.target.value)} style={{flex:1,border:"1px solid #E2E8F0",borderRadius:8,padding:"7px 8px",fontSize:12,background:"#fff",color:"#374151"}}>
              <option value="all">All types</option>
              {Object.entries(TYPE_META).map(([k,v])=><option key={k} value={k}>{v.icon} {v.label}</option>)}
            </select>
            <select value={filterYear} onChange={e=>setFilterYear(e.target.value)} style={{flex:1,border:"1px solid #E2E8F0",borderRadius:8,padding:"7px 8px",fontSize:12,background:"#fff",color:"#374151"}}>
              <option value="all">All year groups</option>
              {Object.entries(YEAR_GROUP_LABELS).map(([k,v])=><option key={k} value={k}>{v}</option>)}
            </select>
          </div>

          {/* ── EVENT LIST ── */}
          <div style={{padding:"0 16px 100px"}}>
            {filtered.length===0 && (
              <div style={{textAlign:"center",padding:"48px 20px",color:"#94A3B8"}}>
                <div style={{fontSize:36,marginBottom:8}}>📭</div>
                <div style={{fontSize:14,fontWeight:600}}>No events match</div>
                <div style={{fontSize:12,marginTop:4}}>Try changing the filter or add one manually</div>
              </div>
            )}
            {filtered.map(ev => {
              const days = daysUntil(ev.date);
              return (
                <div key={ev.id} onClick={()=>setSelected(ev)} style={{
                  background:"#fff",borderRadius:14,padding:"14px",marginBottom:10,cursor:"pointer",
                  border:"1px solid #E8EDF5",boxShadow:"0 1px 4px rgba(0,0,0,0.05)"
                }}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:5}}>
                    <div style={{fontSize:12,color:"#64748B",fontWeight:500,flex:1,paddingRight:8}}>{formatDate(ev.date)}</div>
                    <DaysChip days={days}/>
                  </div>
                  <div style={{fontSize:15,fontWeight:700,color:"#0F172A",marginBottom:6,lineHeight:1.3}}>{ev.title}</div>
                  {ev.detail && (
                    <div style={{
                      fontSize:12,color:"#475569",marginBottom:10,lineHeight:1.55,
                      display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"
                    }}>{ev.detail}</div>
                  )}
                  <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>
                    <Badge type={ev.type} small/>
                    {ev.yearGroups?.filter(g=>g!=="all").map(g=><YearBadge key={g} group={g}/>)}
                    <SourcePill source={ev.source}/>
                  </div>
                </div>
              );
            })}
          </div>

          {/* ── MODAL: Event Detail ── */}
          {selected && (
            <Modal onClose={()=>setSelected(null)}>
              <div style={{padding:22}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                  <div style={{flex:1,paddingRight:10}}>
                    <div style={{fontSize:13,fontWeight:600,color:"#64748B",marginBottom:4}}>{formatDate(selected.date)}</div>
                    <div style={{fontSize:20,fontWeight:800,color:"#0F172A",lineHeight:1.2}}>
                      {TYPE_META[selected.type]?.icon} {selected.title}
                    </div>
                  </div>
                  <button onClick={()=>setSelected(null)} style={{background:"none",border:"none",fontSize:24,cursor:"pointer",color:"#94A3B8",padding:0,lineHeight:1}}>×</button>
                </div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
                  <Badge type={selected.type}/>
                  {selected.yearGroups?.map(g=><YearBadge key={g} group={g}/>)}
                  <SourcePill source={selected.source}/>
                </div>
                {selected.detail && (
                  <div style={{background:blueL,borderRadius:12,padding:14,fontSize:14,color:"#334155",lineHeight:1.65,marginBottom:18}}>
                    {selected.detail}
                  </div>
                )}
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>addToCalendar(selected)} style={{
                    flex:1,background:blue,color:"#fff",border:"none",borderRadius:12,
                    padding:"13px",fontSize:13,fontWeight:700,cursor:"pointer"
                  }}>
                    {calSuccess===selected.id ? "✓ Opening Google Calendar…" : "📅 Add to Google Calendar"}
                  </button>
                  {selected.source==="custom" && (
                    <button onClick={()=>{setEvents(p=>p.filter(e=>e.id!==selected.id));setSelected(null);}} style={{
                      background:"#FEF2F2",color:"#DC2626",border:"1px solid #FECACA",
                      borderRadius:12,padding:"13px 16px",fontSize:13,fontWeight:700,cursor:"pointer"
                    }}>🗑️</button>
                  )}
                </div>
              </div>
            </Modal>
          )}

          {/* ── MODAL: Load Flyer ── */}
          {showFlyer && (
            <Modal onClose={()=>{setShowFlyer(false);setFlyerResult(null);setFlyerFile(null);}}>
              <div style={{padding:22}}>
                <ModalTitle onClose={()=>{setShowFlyer(false);setFlyerResult(null);setFlyerFile(null);}}>📄 Load Friday Flyer</ModalTitle>
                <p style={{fontSize:13,color:"#64748B",marginBottom:14,lineHeight:1.55}}>
                  Save the Friday Flyer PDF to your Files app, then select it here. Claude will read it and extract all events.
                </p>

                <Label>Anthropic API Key</Label>
                <input
                  type="password"
                  value={apiKey}
                  onChange={e=>setApiKey(e.target.value)}
                  placeholder="sk-ant-…"
                  style={inputStyle}/>
                <div style={{fontSize:11,color:"#94A3B8",marginTop:4,marginBottom:2}}>Saved in your browser only — never in the code.</div>

                <Label>Friday Flyer PDF</Label>
                <label style={{
                  display:"flex", alignItems:"center", gap:10,
                  border:"1px solid #E2E8F0", borderRadius:8, padding:"10px 12px",
                  background:"#F8FAFC", cursor:"pointer", marginTop:2,
                }}>
                  <span style={{fontSize:20}}>📎</span>
                  <span style={{fontSize:13, color: flyerFile ? "#0F172A" : "#94A3B8", flex:1}}>
                    {flyerFile ? flyerFile.name : "Tap to choose PDF from Files…"}
                  </span>
                  <input
                    type="file"
                    accept="application/pdf"
                    style={{display:"none"}}
                    onChange={e => { setFlyerFile(e.target.files[0] || null); setFlyerResult(null); }}
                  />
                </label>

                <button onClick={parseFlyer} disabled={flyerLoading || !flyerFile} style={{
                  width:"100%",background:blue,color:"#fff",border:"none",borderRadius:12,
                  padding:13,fontSize:14,fontWeight:700,
                  cursor:(flyerLoading||!flyerFile)?"default":"pointer",
                  opacity:(flyerLoading||!flyerFile)?0.5:1,
                  marginTop:12,marginBottom:12
                }}>{flyerLoading ? "⏳ Extracting…" : "Extract Events"}</button>

                {flyerResult?.error && (
                  <div style={{background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:10,padding:12,fontSize:13,color:"#DC2626"}}>{flyerResult.error}</div>
                )}
                {flyerResult?.events && (
                  <>
                    <div style={{fontWeight:700,fontSize:14,marginBottom:6}}>Found {flyerResult.events.length} events</div>
                    {flyerResult.summary && <div style={{fontSize:12,color:"#64748B",marginBottom:10}}>{flyerResult.summary}</div>}
                    {flyerResult.events.map((e,i) => (
                      <div key={i} style={{background:blueL,borderRadius:10,padding:"10px 12px",marginBottom:6}}>
                        <div style={{fontWeight:700,fontSize:13}}>{e.title}</div>
                        {e.date && <div style={{fontSize:12,color:"#64748B"}}>{formatDate(e.date)}</div>}
                        <div style={{marginTop:4}}><Badge type={e.type} small/></div>
                      </div>
                    ))}
                    <button onClick={importFlyer} style={{width:"100%",marginTop:10,background:"#16A34A",color:"#fff",border:"none",borderRadius:12,padding:13,fontSize:14,fontWeight:700,cursor:"pointer"}}>✓ Import All</button>
                  </>
                )}
              </div>
            </Modal>
          )}

          {/* ── MODAL: Add Event ── */}
          {showAdd && (
            <Modal onClose={()=>setShowAdd(false)}>
              <div style={{padding:22}}>
                <ModalTitle onClose={()=>setShowAdd(false)}>✏️ Add Event</ModalTitle>
                <Label>Event name</Label>
                <input value={newEv.title} onChange={e=>setNewEv(p=>({...p,title:e.target.value}))}
                  placeholder="e.g. Permission slip due" style={inputStyle}/>
                <Label>Date</Label>
                <input type="date" value={newEv.date} min={today}
                  onChange={e=>setNewEv(p=>({...p,date:e.target.value}))} style={inputStyle}/>
                <Label>Type</Label>
                <select value={newEv.type} onChange={e=>setNewEv(p=>({...p,type:e.target.value}))} style={inputStyle}>
                  {Object.entries(TYPE_META).map(([k,v])=><option key={k} value={k}>{v.icon} {v.label}</option>)}
                </select>
                <Label>Year group</Label>
                <select value={newEv.yearGroups[0]} onChange={e=>setNewEv(p=>({...p,yearGroups:[e.target.value]}))} style={inputStyle}>
                  {Object.entries(YEAR_GROUP_LABELS).map(([k,v])=><option key={k} value={k}>{v}</option>)}
                </select>
                <Label>Notes (optional)</Label>
                <textarea value={newEv.detail} onChange={e=>setNewEv(p=>({...p,detail:e.target.value}))}
                  placeholder="Any extra detail…" rows={3}
                  style={{...inputStyle,resize:"vertical",fontFamily:"inherit"}}/>
                <button onClick={addEvent} disabled={!newEv.title||!newEv.date} style={{
                  width:"100%",background:blue,color:"#fff",border:"none",borderRadius:12,
                  padding:13,fontSize:14,fontWeight:700,cursor:"pointer",marginTop:12,
                  opacity:(!newEv.title||!newEv.date)?0.5:1
                }}>Add Event</button>
              </div>
            </Modal>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
